[project]
name = "paycore-persistence"
version = "1.0.0"
requires-python = ">=3.11"
dependencies = ["paycore-domain>=1.0.0", "sqlalchemy>=2.0.0", "cryptography>=42.0.0"]

[build-system]
requires = ["setuptools>=69.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
